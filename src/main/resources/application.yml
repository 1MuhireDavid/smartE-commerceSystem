spring:
  profiles:
    active: dev
  application:
    name: smart-ecommerce-api

  # ── Google OAuth2 (US 4.1) ──────────────────────────────────────────────────
  # Set GOOGLE_CLIENT_ID and GOOGLE_CLIENT_SECRET environment variables.
  # In Google Cloud Console: APIs & Services → Credentials → OAuth 2.0 Client IDs
  # Authorized redirect URI to register: http://localhost:8080/login/oauth2/code/google
  security:
    oauth2:
      client:
        registration:
          google:
            client-id: ${GOOGLE_CLIENT_ID:not-set}
            client-secret: ${GOOGLE_CLIENT_SECRET:not-set}
            scope:
              - email
              - profile
        provider:
          google:
            authorization-uri: https://accounts.google.com/o/oauth2/v2/auth
            token-uri: https://oauth2.googleapis.com/token
            user-info-uri: https://www.googleapis.com/oauth2/v3/userinfo
            user-name-attribute: sub

  cache:
    type: caffeine
    cache-names: products,categories,users
    caffeine:
      # recordStats enables hit/miss tracking exposed via GET /api/monitoring/cache-stats
      spec: maximumSize=500,expireAfterWrite=10m,recordStats
  jackson:
    time-zone: UTC
    serialization:
      write-dates-as-timestamps: false
  graphql:
    path: /graphql
    graphiql:
      enabled: true          # overridden to false in prod
      path: /graphiql
    schema:
      printer:
        enabled: true        # exposes schema at /graphql/schema

server:
  port: 8080

# ── JWT ───────────────────────────────────────────────────────────────────────
# Override JWT_SECRET with a strong base64-encoded key in production
jwt:
  secret: ${JWT_SECRET}
  expiration: ${JWT_EXPIRATION}   # 24 h in milliseconds

# ── AOP monitoring ────────────────────────────────────────────────────────────
monitoring:
  # Service methods that take longer than this threshold are logged as WARN
  slow-method-threshold-ms: 500

---
# ── DEV profile ──────────────────────────────────────────────────────────────
spring:
  config:
    activate:
      on-profile: dev
  datasource:
    url: jdbc:postgresql://localhost:5432/smart_ecommerce
    username: postgres
    password: rwanda
    driver-class-name: org.postgresql.Driver
  jpa:
    open-in-view: false
    hibernate:
      ddl-auto: validate
    show-sql: true
    properties:
      hibernate:
        format_sql: true

logging:
  level:
    org.ecommerce.api: DEBUG
    org.hibernate.SQL: DEBUG

---
# ── TEST profile ──────────────────────────────────────────────────────────────
spring:
  config:
    activate:
      on-profile: test
  datasource:
    url: jdbc:postgresql://localhost:5432/smart_ecommerce_test
    username: postgres
    password: rwanda
    driver-class-name: org.postgresql.Driver
  jpa:
    open-in-view: false
    hibernate:
      ddl-auto: create-drop
    show-sql: false
  cache:
    caffeine:
      spec: maximumSize=100,expireAfterWrite=1m,recordStats

logging:
  level:
    org.ecommerce.api: INFO

---
# ── PROD profile ──────────────────────────────────────────────────────────────
spring:
  config:
    activate:
      on-profile: prod
  datasource:
    url: ${DATABASE_URL}
    driver-class-name: org.postgresql.Driver
  jpa:
    open-in-view: false
    hibernate:
      ddl-auto: validate
    show-sql: false
  graphql:
    graphiql:
      enabled: false         # disable interactive UI in production

server:
  port: ${PORT:8080}

logging:
  level:
    root: WARN
    org.ecommerce.api: INFO
